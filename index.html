<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Study App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F3F6F4;
    --card: #FFFFFF;
    --ink: #33423B;
    --ink-soft: #7C8A83;
    --ink-faint: #A9B3AD;
    --line: #E6ECE8;

    --mint: #8FD6A6;
    --mint-deep: #4FAE73;
    --mint-bg: #EAF8EF;

    --sky: #8FCBE0;
    --sky-deep: #4C93AC;
    --sky-bg: #EAF5F9;

    --amber: #F0C36B;
    --amber-deep: #C99A3C;
    --amber-bg: #FBF3E1;

    --coral: #F0A090;
    --coral-deep: #C96B58;
    --coral-bg: #FBEBE7;

    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 12px;

    --shadow-card: 0 2px 0 var(--line), 0 10px 24px -18px rgba(51,66,59,0.35);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body{
    display:flex;
    justify-content:center;
    min-height: 100vh;
  }

  .hidden{ display:none !important; }

  /* ---------- User Select Screen ---------- */
  .user-select-screen{
    width:100%;
    max-width:480px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding: 32px 20px;
  }

  .user-select-prompt{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:22px;
    color: var(--ink);
    text-align:center;
    margin: 0 0 22px;
  }

  .user-select-list{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .user-select-card{
    display:flex;
    align-items:center;
    gap:12px;
    background: var(--card);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 14px 14px;
    cursor:pointer;
    user-select:none;
    transition: transform 0.15s ease;
  }
  .user-select-card:active{ transform: scale(0.98); }

  .user-select-text{
    display:flex;
    flex-direction:column;
    min-width:0;
    flex:1;
  }

  .user-select-name{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:16px;
    color: var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .user-select-username{
    font-size:12px;
    font-weight:700;
    color: var(--ink-faint);
    margin-top:1px;
  }

  .user-select-joined{
    font-size:11px;
    font-weight:600;
    color: var(--ink-faint);
    margin-top:3px;
  }

  .user-select-badge{
    display:inline-block;
    font-size:10px;
    font-weight:700;
    color: var(--mint-deep);
    background: var(--mint-bg);
    border-radius: 999px;
    padding: 2px 8px;
    margin-top:5px;
    width:fit-content;
  }

  .user-select-enter{
    flex-shrink:0;
    width:40px;
    height:40px;
    border-radius:50%;
    background: var(--mint-bg);
    color: var(--mint-deep);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .user-select-enter svg{ width:18px; height:18px; }

  .user-select-empty{
    text-align:center;
    font-size:13px;
    font-weight:600;
    color: var(--ink-faint);
    padding: 20px;
  }

  /* ---------- App Shell ---------- */
  .app{
    width:100%;
    max-width: 480px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ---------- Top App Bar ---------- */
  .topbar{
    position: sticky;
    top:0;
    z-index: 30;
    background: var(--bg);
    padding: 18px 16px 6px;
  }

  .topbar-row{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .profile-switch{
    flex: 1 1 auto;
    min-width:0;
    transition: flex-basis 0.3s ease;
  }

  .ps-main{
    display:flex;
    align-items:center;
    gap:10px;
    background: var(--card);
    border-radius: 999px;
    padding: 6px 16px 6px 6px;
    box-shadow: var(--shadow-card);
    cursor:pointer;
    user-select:none;
  }

  .ps-avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    flex-shrink:0;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:16px;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.08);
    background: linear-gradient(160deg, var(--mint) 0%, var(--mint-deep) 100%);
  }

  .ps-text{
    display:flex;
    flex-direction:column;
    min-width:0;
    flex:1;
  }

  .ps-name{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:15px;
    color: var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .ps-username{
    font-size:12px;
    font-weight:700;
    color: var(--ink-faint);
    max-height:0;
    opacity:0;
    overflow:hidden;
    transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.25s ease;
  }
  .profile-switch.expanded .ps-username{
    max-height:18px;
    opacity:1;
    margin-top:1px;
  }

  .ps-chevron{
    flex-shrink:0;
    color: var(--ink-faint);
    display:flex;
    transition: transform 0.3s ease;
  }
  .ps-chevron svg{ width:16px; height:16px; }
  .profile-switch.expanded .ps-chevron{ transform: rotate(180deg); }

  .add-btn{
    flex-shrink:0;
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background: var(--mint-deep);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: var(--shadow-card);
    cursor:pointer;
    transition: opacity 0.25s ease, width 0.3s ease, margin 0.3s ease, padding 0.3s ease;
  }
  .add-btn svg{ width:20px; height:20px; }
  .add-btn:active{ transform: scale(0.94); }

  .topbar-row.expanded .add-btn{
    opacity:0;
    width:0;
    height:44px;
    overflow:hidden;
    pointer-events:none;
    margin-left:-10px;
  }

  .ps-dropdown{
    display:flex;
    flex-direction:column;
    gap:8px;
    max-height:0;
    opacity:0;
    overflow:hidden;
    margin-top:0;
    transition: max-height 0.3s ease, opacity 0.25s ease, margin-top 0.3s ease;
  }
  .ps-dropdown.open{
    max-height: 320px;
    opacity:1;
    margin-top:10px;
    overflow-y:auto;
  }

  .ps-dropdown-row{
    display:flex;
    align-items:center;
    gap:10px;
    background: var(--card);
    border-radius: 999px;
    padding: 6px 6px;
    box-shadow: var(--shadow-card);
    cursor:pointer;
    user-select:none;
    flex-shrink:0;
  }
  .ps-dropdown-row:active{ transform: scale(0.99); }

  .ps-switch-icon{
    flex-shrink:0;
    margin-left:auto;
    width:34px;
    height:34px;
    border-radius:50%;
    background: var(--mint-bg);
    color: var(--mint-deep);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .ps-switch-icon svg{ width:16px; height:16px; }

  .ps-dropdown-empty{
    font-size:12px;
    font-weight:600;
    color: var(--ink-faint);
    text-align:center;
    padding: 6px;
  }

  /* ---------- Pages ---------- */
  .pages{
    flex:1;
    padding: 10px 16px 24px;
  }

  .page{ display:none; }
  .page.active{ display:block; animation: fadeUp 0.35s ease; }

  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .page-placeholder{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    background: var(--card);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 56px 24px;
    min-height: 58vh;
    margin-top: 4px;
  }

  .page-placeholder-icon{
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:18px;
  }
  .page-placeholder-icon svg{ width:28px; height:28px; }
  .page-placeholder-icon.mint{ background: var(--mint-bg); color: var(--mint-deep); }
  .page-placeholder-icon.sky{ background: var(--sky-bg); color: var(--sky-deep); }
  .page-placeholder-icon.amber{ background: var(--amber-bg); color: var(--amber-deep); }
  .page-placeholder-icon.coral{ background: var(--coral-bg); color: var(--coral-deep); }

  .page-placeholder-title{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:19px;
    color: var(--ink);
    margin-bottom:6px;
  }

  .page-placeholder-text{
    font-size:13px;
    font-weight:700;
    color: var(--ink-faint);
    max-width:220px;
    line-height:1.5;
  }

  /* ---------- Bottom Navigation ---------- */
  .bottom-nav{
    position: fixed;
    bottom:0;
    left:50%;
    transform: translateX(-50%);
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:space-around;
    align-items:center;
    background: var(--card);
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    box-shadow: 0 -2px 0 var(--line), 0 -10px 24px -18px rgba(51,66,59,0.35);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    z-index: 40;
  }

  .nav-btn{
    border:none;
    background: transparent;
    width:52px;
    height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius: 14px;
    color: var(--ink-faint);
    cursor:pointer;
    transition: background 0.25s ease, color 0.25s ease;
  }
  .nav-btn svg{ width:23px; height:23px; }
  .nav-btn.active{
    background: var(--mint-bg);
    color: var(--mint-deep);
  }

  /* spacer so content never sits under the fixed bottom nav */
  .nav-spacer{ height: 78px; }
</style>
</head>
<body>

<!-- ===== User Selection Screen ===== -->
<div class="user-select-screen" id="userSelectScreen">
  <div class="user-select-prompt">Please select a user</div>
  <div class="user-select-list" id="userSelectList"></div>
</div>

<!-- ===== App Shell ===== -->
<div class="app hidden" id="appRoot">

  <header class="topbar" id="topbar">
    <div class="topbar-row" id="topbarRow">

      <div class="profile-switch" id="profileSwitch">
        <div class="ps-main" id="psMain">
          <div class="ps-avatar" id="psAvatar"></div>
          <div class="ps-text">
            <div class="ps-name" id="psName"></div>
            <div class="ps-username" id="psUsername"></div>
          </div>
          <div class="ps-chevron">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </div>
        </div>

        <div class="ps-dropdown" id="psDropdown"></div>
      </div>

      <button class="add-btn" id="addBtn" aria-label="Add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>

    </div>
  </header>

  <main class="pages">

    <section class="page active" id="page-home">
      <div class="page-placeholder">
        <div class="page-placeholder-icon mint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg>
        </div>
        <div class="page-placeholder-title">Home</div>
        <div class="page-placeholder-text">This page's content will be added later.</div>
      </div>
    </section>

    <section class="page" id="page-dashboard">
      <div class="page-placeholder">
        <div class="page-placeholder-icon sky">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="8" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="15" width="7" height="6" rx="2"/></svg>
        </div>
        <div class="page-placeholder-title">Dashboard</div>
        <div class="page-placeholder-text">This page's content will be added later.</div>
      </div>
    </section>

    <section class="page" id="page-calendar">
      <div class="page-placeholder">
        <div class="page-placeholder-icon amber">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
        </div>
        <div class="page-placeholder-title">Calendar</div>
        <div class="page-placeholder-text">This page's content will be added later.</div>
      </div>
    </section>

    <section class="page" id="page-profile">
      <div class="page-placeholder">
        <div class="page-placeholder-icon coral">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
        </div>
        <div class="page-placeholder-title">Profile</div>
        <div class="page-placeholder-text">This page's content will be added later.</div>
      </div>
    </section>

    <div class="nav-spacer"></div>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="home" aria-label="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg>
    </button>
    <button class="nav-btn" data-page="dashboard" aria-label="Dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="8" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="15" width="7" height="6" rx="2"/></svg>
    </button>
    <button class="nav-btn" data-page="calendar" aria-label="Calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
    </button>
    <button class="nav-btn" data-page="profile" aria-label="Profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
    </button>
  </nav>

</div>

<script>
  // =====================================================================
  // USER DATABASE
  // Primary source: database/user/users.json
  // Falls back to the in-code database below if that file can't be loaded
  // (e.g. opening this file directly instead of serving it over http).
  // =====================================================================
  const USERS_JSON_PATH = 'database/user/users.json';

  const FALLBACK_USERS_DB = {
    users: [
      {
        id: 'user1',
        username: 'study.knight',
        name: 'Study Knight',
        joinedDate: '2026-06-21',
        active: true
      },
      {
        id: 'user2',
        username: 'hydra',
        name: 'Hydra',
        joinedDate: '2026-06-21',
        active: true
      }
    ]
  };

  const SESSION_COOKIE_NAME = 'studyapp_session';
  const SESSION_COOKIE_DAYS = 30;

  let usersDB = { users: [] };
  let currentUserId = null;

  // ---------------- Element refs ----------------
  const userSelectScreen = document.getElementById('userSelectScreen');
  const userSelectList   = document.getElementById('userSelectList');
  const appRoot          = document.getElementById('appRoot');

  const topbarRow      = document.getElementById('topbarRow');
  const profileSwitch  = document.getElementById('profileSwitch');
  const psMain         = document.getElementById('psMain');
  const psDropdown     = document.getElementById('psDropdown');
  const psAvatar       = document.getElementById('psAvatar');
  const psName         = document.getElementById('psName');
  const psUsername     = document.getElementById('psUsername');
  const addBtn         = document.getElementById('addBtn');
  const navBtns        = document.querySelectorAll('.nav-btn');
  const pages          = document.querySelectorAll('.page');

  // ---------------- Cookie helpers ----------------
  function setCookie(name, value, days){
    const expires = new Date(Date.now() + days * 24 * 60 * 60 * 1000).toUTCString();
    document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/; SameSite=Lax';
  }

  function getCookie(name){
    const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
    return match ? decodeURIComponent(match[1]) : null;
  }

  function readSession(){
    const raw = getCookie(SESSION_COOKIE_NAME);
    if (!raw) return null;
    try { return JSON.parse(raw); } catch (e) { return null; }
  }

  // Saves login-related info (username + last login time) to a cookie.
  // Called on initial selection AND whenever the user is switched from
  // the top-bar switcher.
  function saveSession(userId){
    const user = findUser(userId);
    if (!user) return;
    const payload = {
      userId: user.id,
      username: user.username,
      lastLogin: new Date().toISOString()
    };
    setCookie(SESSION_COOKIE_NAME, JSON.stringify(payload), SESSION_COOKIE_DAYS);
  }

  // ---------------- Data helpers ----------------
  function findUser(id){
    return usersDB.users.find(u => u.id === id) || null;
  }

  function activeUsers(){
    return usersDB.users.filter(u => u.active !== false);
  }

  function initial(name){
    return (name || '').trim().charAt(0).toUpperCase();
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function formatJoined(dateStr){
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
  }

  async function loadUsersDB(){
    try {
      const res = await fetch(USERS_JSON_PATH, { cache: 'no-store' });
      if (!res.ok) throw new Error('users.json request failed: ' + res.status);
      const data = await res.json();
      if (!data || !Array.isArray(data.users) || data.users.length === 0) {
        throw new Error('users.json had no usable users');
      }
      return data;
    } catch (err) {
      console.warn('Could not load ' + USERS_JSON_PATH + ', using in-code fallback database.', err);
      return FALLBACK_USERS_DB;
    }
  }

  // ---------------- User Select screen ----------------
  function enterIconSvg(){
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M13 6l6 6-6 6"/></svg>';
  }

  function renderUserSelectList(){
    const session = readSession();
    const list = activeUsers();
    userSelectList.innerHTML = '';

    if (list.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'user-select-empty';
      empty.textContent = 'No users found in the database.';
      userSelectList.appendChild(empty);
      return;
    }

    list.forEach(u => {
      const card = document.createElement('div');
      card.className = 'user-select-card';

      const lastUsedBadge = (session && session.userId === u.id)
        ? '<div class="user-select-badge">Last used</div>'
        : '';

      card.innerHTML =
        '<div class="ps-avatar">' + escapeHtml(initial(u.name)) + '</div>' +
        '<div class="user-select-text">' +
          '<div class="user-select-name">' + escapeHtml(u.name) + '</div>' +
          '<div class="user-select-username">@' + escapeHtml(u.username) + '</div>' +
          '<div class="user-select-joined">Joined ' + escapeHtml(formatJoined(u.joinedDate)) + '</div>' +
          lastUsedBadge +
        '</div>' +
        '<div class="user-select-enter" aria-label="Enter">' + enterIconSvg() + '</div>';

      card.addEventListener('click', () => enterApp(u.id));
      userSelectList.appendChild(card);
    });
  }

  function enterApp(userId){
    currentUserId = userId;
    saveSession(userId);
    renderProfileSwitch();

    userSelectScreen.classList.add('hidden');
    appRoot.classList.remove('hidden');
  }

  // ---------------- Top bar / profile switcher ----------------
  function switchIconSvg(){
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h12l-3.5-3.5M17 17H5l3.5 3.5"/></svg>';
  }

  function renderProfileSwitch(){
    const cur = findUser(currentUserId);
    if (!cur) return;

    psAvatar.textContent = initial(cur.name);
    psName.textContent = cur.name;
    psUsername.textContent = '@' + cur.username;

    renderDropdownList();
  }

  function renderDropdownList(){
    const others = activeUsers().filter(u => u.id !== currentUserId);
    psDropdown.innerHTML = '';

    if (others.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'ps-dropdown-empty';
      empty.textContent = 'No other users available.';
      psDropdown.appendChild(empty);
      return;
    }

    others.forEach(u => {
      const row = document.createElement('div');
      row.className = 'ps-dropdown-row';
      row.innerHTML =
        '<div class="ps-avatar">' + escapeHtml(initial(u.name)) + '</div>' +
        '<div class="ps-text">' +
          '<div class="ps-name">' + escapeHtml(u.name) + '</div>' +
          '<div class="ps-username">@' + escapeHtml(u.username) + '</div>' +
        '</div>' +
        '<div class="ps-switch-icon">' + switchIconSvg() + '</div>';

      row.addEventListener('click', () => handleUserSwitch(u.id));
      psDropdown.appendChild(row);
    });
  }

  function setExpanded(expanded){
    profileSwitch.classList.toggle('expanded', expanded);
    topbarRow.classList.toggle('expanded', expanded);
    psDropdown.classList.toggle('open', expanded);
  }

  function toggleExpanded(){
    setExpanded(!profileSwitch.classList.contains('expanded'));
  }

  psMain.addEventListener('click', toggleExpanded);

  // Switching users from inside the container — saves the cookie/session
  // again so "lastLogin" and "username" always reflect the active user.
  function handleUserSwitch(nextUserId){
    // TODO: wire up any additional real switch-account functionality here later.
    currentUserId = nextUserId;
    saveSession(nextUserId);
    renderProfileSwitch();
    setExpanded(false);
  }

  document.addEventListener('click', (e) => {
    if (!profileSwitch.contains(e.target) && profileSwitch.classList.contains('expanded')) {
      setExpanded(false);
    }
  });

  addBtn.addEventListener('click', () => {
    // TODO: wire up add functionality here later.
    console.log('Add button tapped');
  });

  // ---------------- Bottom navigation / page switching ----------------
  navBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.page;

      navBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      pages.forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + target).classList.add('active');

      setExpanded(false);
    });
  });

  // ---------------- Init ----------------
  (async function init(){
    usersDB = await loadUsersDB();
    renderUserSelectList();
  })();
</script>

</body>
</html>
