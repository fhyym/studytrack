<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Study App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="user-select-screen hidden" id="userSelectScreen">
    <div class="user-select-prompt">Please select a user</div>
    <div class="user-select-list" id="userSelectList"></div>
  </div>

  <div class="app hidden" id="appRoot">

    <header class="topbar" id="topbar">
      <div class="topbar-row" id="topbarRow">
        <div class="profile-switch" id="profileSwitch">
          <div class="ps-main" id="psMain">
            <div class="ps-avatar" id="psAvatar"></div>
            <div class="ps-text">
              <div class="ps-name" id="psName"></div>
              <div class="ps-username" id="psUsername"></div>
            </div>
            <div class="ps-chevron">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </div>
          </div>
          <div class="ps-dropdown" id="psDropdown"></div>
        </div>
        <button class="add-btn" id="addBtn" aria-label="Add">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
    </header>

    <main class="pages">
      <section class="page active" id="page-home">
        <div class="page-placeholder">
          <div class="page-placeholder-icon mint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg>
          </div>
          <div class="page-placeholder-title">Home</div>
          <div class="page-placeholder-text">This page's content will be added later.</div>
        </div>
      </section>

      <section class="page" id="page-dashboard">
        <div class="page-placeholder">
          <div class="page-placeholder-icon sky">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="8" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="15" width="7" height="6" rx="2"/></svg>
          </div>
          <div class="page-placeholder-title">Dashboard</div>
          <div class="page-placeholder-text">This page's content will be added later.</div>
        </div>
      </section>

      <section class="page" id="page-calendar">
        <div class="page-placeholder">
          <div class="page-placeholder-icon amber">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
          </div>
          <div class="page-placeholder-title">Calendar</div>
          <div class="page-placeholder-text">This page's content will be added later.</div>
        </div>
      </section>

      <section class="page" id="page-profile">
        <div class="profile-header">
          <div class="avatar-ring" id="avatarRing">
            <div class="avatar" id="avatarLetter"></div>
          </div>
          <div class="name" id="profileName"></div>
          <div class="username" id="profileUsername"></div>
          <div class="streak-pill">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 3-2 4.5-2 7a4 4 0 1 0 8 0c0-1-.3-2-1-3 2 1 4 3.5 4 7a7 7 0 1 1-14 0c0-4 2-6 5-11z"/></svg>
            <span id="streakText"></span>
          </div>
        </div>

        <div class="profile-tabs">
          <button class="profile-tab-btn active" data-ptab="overview">Overview</button>
          <button class="profile-tab-btn" data-ptab="records">Records</button>
        </div>

        <div class="profile-panel active" id="ppanel-overview">
          <div class="section-label">Overview</div>
          <div class="overview-grid" id="overviewGrid"></div>
        </div>

        <div class="profile-panel" id="ppanel-records">
          <div class="section-label">Personal Records</div>
          <div class="records-grid" id="recordsGrid"></div>
        </div>
      </section>

      <div class="nav-spacer"></div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-page="home" aria-label="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg>
      </button>
      <button class="nav-btn" data-page="dashboard" aria-label="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="8" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="15" width="7" height="6" rx="2"/></svg>
      </button>
      <button class="nav-btn" data-page="calendar" aria-label="Calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
      </button>
      <button class="nav-btn" data-page="profile" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
      </button>
    </nav>

  </div>

  <script src="js/profile.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
