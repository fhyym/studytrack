<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudySync — Track. Report. Grow.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --surface:   #151820;
    --card:      #1b1f2b;
    --border:    #252a38;
    --accent1:   #6c8bff;   /* student 1 – periwinkle blue  */
    --accent2:   #49d9a2;   /* student 2 – mint green       */
    --text:      #e8eaf0;
    --muted:     #6b7280;
    --done:      #49d9a2;
    --miss:      #ff6b6b;
    --radius:    14px;
    --font:      'DM Sans', sans-serif;
    --mono:      'DM Mono', monospace;
    --ease:      cubic-bezier(.4,0,.2,1);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,20,.9);
    backdrop-filter: blur(18px);
  }
  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -.3px;
  }
  .logo span { color: var(--accent1); }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .month-nav button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 34px; height: 34px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: grid; place-items: center;
    transition: background .2s var(--ease), border-color .2s var(--ease);
  }
  .month-nav button:hover { background: var(--border); border-color: var(--accent1); }
  #monthLabel {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    min-width: 110px;
    text-align: center;
  }

  /* ── LAYOUT ── */
  main { max-width: 1200px; margin: 0 auto; padding: 40px 24px 80px; }

  /* ── STUDENT TABS ── */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }
  .tab {
    padding: 10px 24px;
    border-radius: 50px;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    transition: all .25s var(--ease);
  }
  .tab.active-1 { background: rgba(108,139,255,.15); border-color: var(--accent1); color: var(--accent1); }
  .tab.active-2 { background: rgba(73,217,162,.15); border-color: var(--accent2); color: var(--accent2); }
  .tab.both     { background: var(--surface); border-color: var(--border); color: var(--text); }

  /* ── SUMMARY CARDS ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 36px;
  }
  .sum-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: border-color .2s var(--ease);
  }
  .sum-card:hover { border-color: var(--accent1); }
  .sum-card .label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .sum-card .value {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
  }
  .sum-card .value.accent1 { color: var(--accent1); }
  .sum-card .value.accent2 { color: var(--accent2); }

  /* ── ADD ENTRY FORM ── */
  .form-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 26px 28px;
    margin-bottom: 36px;
  }
  .form-section h3 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .3px;
    margin-bottom: 18px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
  }
  .form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .form-group input, .form-group select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 13px;
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    transition: border-color .2s var(--ease);
    min-width: 140px;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent1); }
  .form-group input[type=number] { width: 120px; }

  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity .2s, transform .15s var(--ease);
  }
  .btn:hover { opacity: .88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-primary  { background: var(--accent1); color: #0d0f14; }
  .btn-danger   { background: transparent; border: 1px solid var(--miss); color: var(--miss); padding: 5px 12px; font-size: 12px; border-radius: 6px; }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 36px;
  }
  .table-header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }
  .table-header-bar h2 { font-size: 15px; font-weight: 600; }
  .table-header-bar .student-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 8px;
  }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 12px 20px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  tbody tr {
    transition: background .15s var(--ease);
    animation: rowIn .3s var(--ease) both;
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  tbody tr:hover { background: rgba(255,255,255,.03); }
  tbody td {
    padding: 13px 20px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }
  .badge.done { background: rgba(73,217,162,.12); color: var(--done); }
  .badge.miss { background: rgba(255,107,107,.12); color: var(--miss); }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .hours-val { font-family: var(--mono); font-size: 14px; }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state p { font-size: 14px; margin-top: 8px; }

  /* ── COMPARISON (both view) ── */
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 36px;
  }
  @media(max-width: 700px) { .compare-grid { grid-template-columns: 1fr; } header { padding: 16px 18px; } main { padding: 24px 14px 60px; } }

  /* ── CHART BAR ── */
  .bar-chart { padding: 24px; }
  .bar-chart h3 { font-size: 13px; color: var(--muted); margin-bottom: 18px; text-transform: uppercase; letter-spacing: .8px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 12px;
  }
  .bar-label { width: 26px; color: var(--muted); font-family: var(--mono); text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; background: var(--surface); border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .6s var(--ease);
  }
  .bar-hours { width: 36px; font-family: var(--mono); color: var(--muted); font-size: 11px; text-align: right; flex-shrink: 0; }

  /* ── EXPORT ── */
  .export-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s var(--ease);
  }
  .export-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 22px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    transition: transform .35s var(--ease), opacity .35s var(--ease);
    opacity: 0;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* month ring */
  .month-progress {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }
  .mp-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .mp-dot.done { background: var(--done); border-color: var(--done); }
  .mp-dot.miss { background: var(--miss); border-color: var(--miss); }

  select option { background: #1b1f2b; }
</style>
</head>
<body>

<header>
  <div class="logo">Study<span>Sync</span></div>
  <div class="month-nav">
    <button id="prevMonth" title="Previous month">&#8249;</button>
    <span id="monthLabel">—</span>
    <button id="nextMonth" title="Next month">&#8250;</button>
  </div>
  <button class="export-btn" id="exportBtn">⬇ Export JSON</button>
</header>

<main>
  <!-- TABS -->
  <div class="tabs">
    <div class="tab active-1" data-view="1" id="tab1">Student 1</div>
    <div class="tab" data-view="2" id="tab2">Student 2</div>
    <div class="tab" data-view="both" id="tabBoth">Compare Both</div>
  </div>

  <!-- SUMMARY -->
  <div class="summary-grid" id="summaryGrid"></div>

  <!-- ADD ENTRY -->
  <div class="form-section" id="addSection">
    <h3>Log Study Session</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Student</label>
        <select id="fStudent">
          <option value="1">Student 1</option>
          <option value="2">Student 2</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="fDate">
      </div>
      <div class="form-group">
        <label>Study Hours</label>
        <input type="number" id="fHours" min="0" max="24" step="0.5" placeholder="e.g. 7">
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button class="btn btn-primary" id="addBtn">+ Add Entry</button>
      </div>
    </div>
  </div>

  <!-- CONTENT AREA -->
  <div id="contentArea"></div>
</main>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// DATA LAYER — JSON stored in localStorage
// ═══════════════════════════════════════════════════════
const STORAGE_KEY = 'studysync_data_v1';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { students: { '1': { name: 'Student 1', entries: [] }, '2': { name: 'Student 2', entries: [] } } };
  } catch { return { students: { '1': { name: 'Student 1', entries: [] }, '2': { name: 'Student 2', entries: [] } } }; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let db = loadData();

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let currentView = '1'; // '1', '2', 'both'
let currentYear, currentMonth;

(function initDate() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth(); // 0-indexed
})();

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function monthKey() { return `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`; }

function getEntries(sid) {
  const mk = monthKey();
  return (db.students[sid]?.entries || []).filter(e => e.date.startsWith(mk));
}

function getStudentColor(sid) { return sid === '1' ? 'var(--accent1)' : 'var(--accent2)'; }

function fmt(n) { return Number(n).toFixed(1); }

function daysInMonth() { return new Date(currentYear, currentMonth+1, 0).getDate(); }

function dayName(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return DAYS[d.getDay()];
}

function dayNum(dateStr) { return parseInt(dateStr.split('-')[2]); }

function calcSummary(entries) {
  if (!entries.length) return { total: 0, avg: 0, days: 0, completed: 0 };
  const total = entries.reduce((s, e) => s + e.hours, 0);
  return {
    total,
    avg: total / entries.length,
    days: entries.length,
    completed: entries.filter(e => e.hours >= 6).length
  };
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || 'var(--border)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════════
// MONTH NAV
// ═══════════════════════════════════════════════════════
function updateMonthLabel() {
  document.getElementById('monthLabel').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
}

document.getElementById('prevMonth').addEventListener('click', () => {
  currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  render();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  render();
});

// ═══════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentView = tab.dataset.view;
    document.querySelectorAll('.tab').forEach(t => { t.className = 'tab'; });
    if (currentView === '1') tab.classList.add('active-1');
    else if (currentView === '2') tab.classList.add('active-2');
    else tab.classList.add('both');
    render();
  });
});

// ═══════════════════════════════════════════════════════
// ADD ENTRY
// ═══════════════════════════════════════════════════════
document.getElementById('fDate').value = new Date().toISOString().split('T')[0];

document.getElementById('addBtn').addEventListener('click', () => {
  const sid   = document.getElementById('fStudent').value;
  const date  = document.getElementById('fDate').value;
  const hours = parseFloat(document.getElementById('fHours').value);

  if (!date) { showToast('Please pick a date.', 'var(--miss)'); return; }
  if (isNaN(hours) || hours < 0 || hours > 24) { showToast('Hours must be 0–24.', 'var(--miss)'); return; }

  // No duplicate date per student
  const existing = db.students[sid].entries.findIndex(e => e.date === date);
  if (existing > -1) {
    db.students[sid].entries[existing].hours = hours; // update
    showToast('Entry updated.', 'var(--accent1)');
  } else {
    db.students[sid].entries.push({ date, hours });
    db.students[sid].entries.sort((a,b) => a.date.localeCompare(b.date));
    showToast('Session logged!', 'var(--done)');
  }

  saveData(db);

  // sync month view to added date
  const [y, m] = date.split('-').map(Number);
  currentYear = y; currentMonth = m - 1;

  render();
});

// ═══════════════════════════════════════════════════════
// DELETE
// ═══════════════════════════════════════════════════════
function deleteEntry(sid, date) {
  db.students[sid].entries = db.students[sid].entries.filter(e => e.date !== date);
  saveData(db);
  showToast('Entry deleted.', 'var(--miss)');
  render();
}

// ═══════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `studysync_${monthKey()}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('JSON exported!', 'var(--accent2)');
});

// ═══════════════════════════════════════════════════════
// RENDER — SUMMARY CARDS
// ═══════════════════════════════════════════════════════
function renderSummary() {
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = '';

  const ids = currentView === 'both' ? ['1','2'] : [currentView];
  ids.forEach(sid => {
    const entries = getEntries(sid);
    const s = calcSummary(entries);
    const col = sid === '1' ? 'accent1' : 'accent2';
    const label = db.students[sid].name;

    const cards = [
      { l: `${label} — Total Hours`,     v: fmt(s.total),     cls: col },
      { l: `${label} — Days Studied`,    v: s.days,           cls: '' },
      { l: `${label} — Avg Hours/Day`,   v: fmt(s.avg),       cls: '' },
      { l: `${label} — Days Completed`,  v: s.completed,      cls: col },
      { l: `${label} — Days Missed*`,    v: Math.max(0, daysInMonth() - s.days), cls: '' },
    ];

    cards.forEach(c => {
      const el = document.createElement('div');
      el.className = 'sum-card';
      el.innerHTML = `<div class="label">${c.l}</div><div class="value ${c.cls}">${c.v}</div>`;
      grid.appendChild(el);
    });
  });
}

// ═══════════════════════════════════════════════════════
// RENDER — SINGLE STUDENT TABLE
// ═══════════════════════════════════════════════════════
function renderTable(sid) {
  const entries = getEntries(sid);
  const s = calcSummary(entries);
  const color = getStudentColor(sid);
  const name  = db.students[sid].name;

  let rows = '';
  if (entries.length === 0) {
    rows = `<tr><td colspan="5">
      <div class="empty-state">
        <div style="font-size:32px">📚</div>
        <p>No sessions logged for ${MONTHS[currentMonth]} ${currentYear}.</p>
      </div>
    </td></tr>`;
  } else {
    entries.forEach((e, i) => {
      const done  = e.hours >= 6;
      const badge = done
        ? `<span class="badge done">Completed</span>`
        : `<span class="badge miss">Incomplete</span>`;
      rows += `
        <tr style="animation-delay:${i * 30}ms">
          <td style="color:var(--muted);font-family:var(--mono)">${String(dayNum(e.date)).padStart(2,'0')}</td>
          <td>${dayName(e.date)}, ${e.date}</td>
          <td><span class="hours-val" style="color:${color}">${fmt(e.hours)}h</span></td>
          <td>${badge}</td>
          <td><button class="btn btn-danger" onclick="deleteEntry('${sid}','${e.date}')">Delete</button></td>
        </tr>`;
    });
  }

  // Bar chart
  let bars = '';
  const max = entries.length ? Math.max(...entries.map(e => e.hours)) : 10;
  entries.forEach(e => {
    const pct = max > 0 ? (e.hours / max) * 100 : 0;
    bars += `<div class="bar-row">
      <span class="bar-label">${String(dayNum(e.date)).padStart(2,'0')}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="bar-hours">${fmt(e.hours)}</span>
    </div>`;
  });

  return `
  <div class="table-wrap" style="margin-bottom:20px">
    <div class="table-header-bar">
      <h2><span class="student-dot" style="background:${color}"></span>${name} — ${MONTHS[currentMonth]} ${currentYear} Report</h2>
      <span style="font-size:13px;color:var(--muted)">${entries.length} sessions &nbsp;·&nbsp; ${fmt(s.total)}h total</span>
    </div>
    <table>
      <thead><tr>
        <th>#</th><th>Day &amp; Date</th><th>Study Hours</th><th>Status</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${entries.length > 0 ? `
    <div style="border-top:1px solid var(--border);padding:18px 24px;display:flex;gap:32px;flex-wrap:wrap">
      <span style="font-size:13px;color:var(--muted)">Total: <strong style="color:var(--text)">${fmt(s.total)}h</strong></span>
      <span style="font-size:13px;color:var(--muted)">Average: <strong style="color:var(--text)">${fmt(s.avg)}h/day</strong></span>
      <span style="font-size:13px;color:var(--muted)">Days studied: <strong style="color:var(--text)">${s.days}</strong></span>
      <span style="font-size:13px;color:var(--muted)">Completed: <strong style="color:var(--done)">${s.completed}</strong></span>
      <span style="font-size:13px;color:var(--muted)">Incomplete: <strong style="color:var(--miss)">${entries.filter(e=>e.hours<6).length}</strong></span>
    </div>` : ''}
  </div>
  ${entries.length > 0 ? `
  <div class="table-wrap" style="margin-bottom:36px">
    <div class="bar-chart">
      <h3>${name} — Daily Hours (${MONTHS[currentMonth]})</h3>
      ${bars}
    </div>
    <div style="padding: 0 24px 20px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Month progress (● = Completed, ● = Incomplete)</div>
      <div class="month-progress">
        ${Array.from({length:daysInMonth()},(_,i)=>{
          const day = String(i+1).padStart(2,'0');
          const key = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${day}`;
          const e   = entries.find(x=>x.date===key);
          if (!e) return `<div class="mp-dot" title="Day ${i+1}: No entry"></div>`;
          return e.hours>=6
            ? `<div class="mp-dot done" title="Day ${i+1}: ${e.hours}h"></div>`
            : `<div class="mp-dot miss" title="Day ${i+1}: ${e.hours}h"></div>`;
        }).join('')}
      </div>
    </div>
  </div>` : ''}`;
}

// ═══════════════════════════════════════════════════════
// RENDER — COMPARE BOTH
// ═══════════════════════════════════════════════════════
function renderBoth() {
  const e1 = getEntries('1');
  const e2 = getEntries('2');
  const s1 = calcSummary(e1);
  const s2 = calcSummary(e2);

  const maxTotal = Math.max(s1.total, s2.total) || 1;
  const w1 = (s1.total / maxTotal * 100).toFixed(1);
  const w2 = (s2.total / maxTotal * 100).toFixed(1);

  // Shared dates comparison
  const allDates = [...new Set([...e1.map(e=>e.date), ...e2.map(e=>e.date)])].sort();

  let compareRows = '';
  allDates.forEach((date, i) => {
    const h1 = e1.find(e=>e.date===date)?.hours;
    const h2 = e2.find(e=>e.date===date)?.hours;
    compareRows += `<tr style="animation-delay:${i*25}ms">
      <td style="color:var(--muted);font-family:var(--mono)">${String(dayNum(date)).padStart(2,'0')}</td>
      <td>${dayName(date)}, ${date}</td>
      <td><span class="hours-val" style="color:var(--accent1)">${h1 != null ? fmt(h1)+'h' : '—'}</span></td>
      <td>${h1 != null ? (h1>=6?'<span class="badge done">Done</span>':'<span class="badge miss">Miss</span>') : '<span style="color:var(--muted);font-size:12px">—</span>'}</td>
      <td><span class="hours-val" style="color:var(--accent2)">${h2 != null ? fmt(h2)+'h' : '—'}</span></td>
      <td>${h2 != null ? (h2>=6?'<span class="badge done">Done</span>':'<span class="badge miss">Miss</span>') : '<span style="color:var(--muted);font-size:12px">—</span>'}</td>
    </tr>`;
  });

  if (!allDates.length) compareRows = `<tr><td colspan="6"><div class="empty-state"><div style="font-size:32px">📊</div><p>No data for either student this month.</p></div></td></tr>`;

  return `
  <div class="table-wrap" style="margin-bottom:24px">
    <div class="table-header-bar">
      <h2>Head-to-Head — ${MONTHS[currentMonth]} ${currentYear}</h2>
    </div>
    <div style="padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Student 1 — Total</div>
        <div class="bar-track" style="height:12px;margin-bottom:6px"><div class="bar-fill" style="width:${w1}%;background:var(--accent1)"></div></div>
        <div style="font-family:var(--mono);font-size:22px;color:var(--accent1)">${fmt(s1.total)}h</div>
      </div>
      <div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Student 2 — Total</div>
        <div class="bar-track" style="height:12px;margin-bottom:6px"><div class="bar-fill" style="width:${w2}%;background:var(--accent2)"></div></div>
        <div style="font-family:var(--mono);font-size:22px;color:var(--accent2)">${fmt(s2.total)}h</div>
      </div>
    </div>
    <table>
      <thead><tr>
        <th>#</th><th>Date</th>
        <th style="color:var(--accent1)">S1 Hours</th><th style="color:var(--accent1)">S1 Status</th>
        <th style="color:var(--accent2)">S2 Hours</th><th style="color:var(--accent2)">S2 Status</th>
      </tr></thead>
      <tbody>${compareRows}</tbody>
    </table>
    ${allDates.length ? `
    <div style="border-top:1px solid var(--border);padding:18px 24px;display:flex;gap:32px;flex-wrap:wrap">
      <span style="font-size:13px;color:var(--muted)">S1 avg: <strong style="color:var(--accent1)">${fmt(s1.avg)}h</strong></span>
      <span style="font-size:13px;color:var(--muted)">S2 avg: <strong style="color:var(--accent2)">${fmt(s2.avg)}h</strong></span>
      <span style="font-size:13px;color:var(--muted)">S1 completed: <strong style="color:var(--done)">${s1.completed}</strong></span>
      <span style="font-size:13px;color:var(--muted)">S2 completed: <strong style="color:var(--done)">${s2.completed}</strong></span>
      <span style="font-size:13px;color:var(--muted)">S1 days: <strong style="color:var(--text)">${s1.days}</strong></span>
      <span style="font-size:13px;color:var(--muted)">S2 days: <strong style="color:var(--text)">${s2.days}</strong></span>
    </div>` : ''}
  </div>`;
}

// ═══════════════════════════════════════════════════════
// MASTER RENDER
// ═══════════════════════════════════════════════════════
function render() {
  updateMonthLabel();
  renderSummary();

  const area = document.getElementById('contentArea');
  if (currentView === 'both') {
    area.innerHTML = renderBoth();
  } else {
    area.innerHTML = renderTable(currentView);
  }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
render();
</script>
</body>
</html>
